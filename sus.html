            <h1 class="neon">MathHelper</h1>
            <h1 class="dot">&nbsp•</h1>
        </div>
        <hr/>
        <div class="links">
            <div class="box-btn">
                <a href="index.html"><button class="btn link">Решение квадратного уравнения</button></a>
            </div>
            <div class="box-btn">
                <a href="circle.html"><button class="btn link">Площадь круга</button></a>
            </div>
            <div class="box-btn">
                <a href="rectangle.html"><button class="btn link">Площадь прямоугольника</button></a>
            </div>
            <div class="box-btn">
                <a href="tr.html"><button class="btn link">Площадь трапеции</button></a>

            </div>
        </div>

    <div class="content">
        <div class="card">
            <h3>Перевод систем счисления</h3>
            <p>Система счисления — символический метод записи чисел, представление чисел с помощью письменных знаков.</p>
            <p>Шестнадцатеричная: </p>
            <div class="group">      
                <input placeholder="HEX..." class="hex input">
                <span class="bar"></span>
            </div>
            <p>Десятичная: </p>
            <div class="group">      
                <input placeholder="DEC..." class="dec input">
                <span class="bar"></span>
            </div>
            <p>Восьмеричная: </p>
            <div class="group">      
                <input placeholder="OCT..." class="oct input">
                <span class="bar"></span>
            </div>
            <p>Двоичная: </p>
            <div class="group">      
                <input placeholder="BIN..." class="bin input">
                <span class="bar"></span>
            </div>
        </div>
    </div>
